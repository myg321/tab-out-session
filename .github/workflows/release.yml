name: Build & Release Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build Extension Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Dependencies
        working-directory: extension-react
        run: pnpm install --no-frozen-lockfile --reporter=append-only

      - name: Build Extension Bundle
        working-directory: extension-react
        run: pnpm build

      - name: Archive Dist Bundle
        working-directory: extension-react
        run: zip -r ../tab-out-session-${{ github.ref_name }}.zip dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: tab-out-session-${{ github.ref_name }}.zip
          name: Tab Out Session ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
